version: '3.8'

services:
  agent-1:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-1
    ports:
      - "2123:2123"
    environment:
      AGENT_TOKEN: agent-token-1
      AGENT_NODE_NAME: agent-1
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-2:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-2
    ports:
      - "2124:2123"
    environment:
      AGENT_TOKEN: agent-token-2
      AGENT_NODE_NAME: agent-2
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-3:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-3
    ports:
      - "2125:2123"
    environment:
      AGENT_TOKEN: agent-token-3
      AGENT_NODE_NAME: agent-3
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
    extra_hosts:
      - "host.docker.internal:host-gateway"
