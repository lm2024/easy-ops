server:
  port: 8081
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  tomcat:
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b'
  path: ./data
  heart-second: 30
  offline-second: 90

spring:
  application:
    name: ops-server
  profiles:
    active: dev
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:./data/ops;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: INFO
    com.ops.server: DEBUG
    com.ops.server.mapper: DEBUG
  file:
    name: ${server.path:./data}/logs/server.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
