version: '3.8'

services:
  agent-1:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-1
    restart: unless-stopped
    ports:
      - "2123:2123"
    volumes:
      - agent1-data:/app/data
    environment:
      AGENT_TOKEN: agent-token-1
      AGENT_NODE_NAME: agent-1
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
      AGENT_HOST_IP: 127.0.0.1
      AGENT_HOST_PORT: 2123
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-2:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-2
    restart: unless-stopped
    ports:
      - "2124:2123"
    volumes:
      - agent2-data:/app/data
    environment:
      AGENT_TOKEN: agent-token-2
      AGENT_NODE_NAME: agent-2
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
      AGENT_HOST_IP: 127.0.0.1
      AGENT_HOST_PORT: 2124
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  agent-3:
    build:
      context: agent/docker
      dockerfile: Dockerfile
    container_name: ops-agent-3
    restart: unless-stopped
    ports:
      - "2125:2123"
    volumes:
      - agent3-data:/app/data
    environment:
      AGENT_TOKEN: agent-token-3
      AGENT_NODE_NAME: agent-3
      AGENT_SERVER_URL: http://host.docker.internal:8081/api
      AGENT_HOST_IP: 127.0.0.1
      AGENT_HOST_PORT: 2125
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  agent1-data:
  agent2-data:
  agent3-data:
