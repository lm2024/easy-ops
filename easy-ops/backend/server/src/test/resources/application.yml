server:
  port: 0
  path: ./data

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: test-jwt-secret-for-unit-tests-only-do-not-use-in-production-verylongkey
  expire-ms: 86400000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: WARN
