# =============================================================================
# EasyOps Server 配置
# -----------------------------------------------------------------------------
# 【私有化部署怎么改】
#   推荐方式：只改本机 scripts/easyops.env + 用 scripts/start.sh 启动。
#   启动脚本会自动注入路径（-Dserver.path 等），本文件里的路径默认值可不动。
#
#   若不用脚本、直接 java -jar 启动，则需手动设置：
#     -Dserver.path=/你的数据目录
#     -Dspring.datasource.url=jdbc:h2:file:/你的数据目录/ops;MODE=MySQL
#
#   端口：改 server.port 即可，或在 easyops.env 里改 SERVER_PORT。
# =============================================================================

server:
  # HTTP 监听端口（私有化可改为内网端口）
  port: ${SERVER_PORT:8081}
  servlet:
    # API 统一前缀，前端代理 /api 到此
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  # 请求/响应大小限制（SEC-010）
  max-http-request-size: 10MB
  max-http-response-size: 10MB
  tomcat:
    max-swallow-size: 10MB
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b'
  # Server 本地数据根目录：H2 库、版本包、日志、Agent 升级包等
  # 启动脚本通过 -Dserver.path 覆盖；直接 java -jar 时默认 ./data（相对启动目录）
  path: ${EASYOPS_SERVER_DATA:./data}
  # 心跳检测：每 N 秒扫描一次节点心跳
  heart-second: 5
  # 超过 N 秒未心跳则标记离线
  offline-second: 90

spring:
  application:
    name: ops-server
  profiles:
    active: dev
  datasource:
    driver-class-name: org.h2.Driver
    # H2 嵌入式库路径（与 server.path 下的 ops 文件对应）
    url: jdbc:h2:file:${EASYOPS_SERVER_DATA:./data}/ops;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      # 生产环境保持 false
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      # 版本包/Jar 上传大小上限
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT 登录鉴权
# 注意：当前项目的 token 实际由 SecureRandom 生成（见 SystemController.generateToken），
# 并非真正的 JWT 签名/验证，jwt.secret 仅用于启动时的存在性校验，不会参与 token 签发或验签。
# Agent 使用独立的 AGENT_TOKEN（X-Token header），前端仅透传 token，均与此值无关。
# 本地开发无需额外配置，已内置默认值；生产环境建议通过环境变量 JWT_SECRET 覆盖。
jwt:
  secret: ${JWT_SECRET:easyops-dev-secret-key-for-local-development-only-2026}
  expire-ms: 86400000

# 默认管理员密码 —— 唯一配置源，改这个值即可（重启生效）
# 说明：仅在密码为默认值时自动刷新；用户手动改过的密码会被保留。
app:
  admin:
    default-password: Admin123!


mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: INFO
    com.ops.server: DEBUG
    com.ops.server.mapper: DEBUG
  file:
    # 日志文件路径（启动脚本可通过 -Dlogging.file.name 覆盖）
    name: ${EASYOPS_SERVER_DATA:./data}/logs/server.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# CORS：内网默认放行所有来源；生产可按需收紧为具体前端地址
cors:
  allowed-origins: "*"

# AI 分析（可选，通过环境变量 AI_API_KEY 注入）
ai:
  apiKey: ${AI_API_KEY:}

# WebSocket 最大连接数
websocket:
  max-connections: 1000

# 全局运维路径（Server 计算 Agent 侧路径、应用部署目录时使用）
ops:
  global:
    # Agent 端数据根目录（与 agent.data-path 保持一致）
    # 启动脚本通过 -Dops.global.agent-data-path 注入
    agent-data-path: ${AGENT_DATA_PATH:/app/data}
    # 应用默认部署根目录（项目未自定义 deployDir 时使用）
    deploy-base-dir: ${OPS_DEPLOY_BASE_DIR:/app/data/apps}
    log-sub-dir: logs
    config-sub-dir: config
    frontend-sub-dir: frontend
