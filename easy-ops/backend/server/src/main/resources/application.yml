# =============================================================================
# EasyOps Server 配置
# =============================================================================
# 生产部署：直接用 scripts/start.sh 启动，无需修改本文件
# 所有生产配置通过环境变量或 start.sh 顶部的变量覆盖
# =============================================================================

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  max-http-request-size: 10MB
  max-http-response-size: 10MB
  tomcat:
    max-swallow-size: 10MB
    accesslog:
      enabled: true
      pattern: '%h %l %u %t "%r" %s %b'
  # 数据根目录（H2、版本包、日志），start.sh 通过 -Dserver.path 覆盖
  path: ${EASYOPS_SERVER_DATA:./data}
  heart-second: 5
  offline-second: 90

spring:
  application:
    name: ops-server
  profiles:
    active: dev
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${EASYOPS_SERVER_DATA:./data}/ops;MODE=MySQL;AUTO_SERVER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT：仅启动校验用，实际 token 由 SecureRandom 生成，非标准 JWT
# 生产：在 start.sh 中修改 JWT_SECRET 变量
jwt:
  secret: ${JWT_SECRET:easyops-dev-secret-key-for-local-development-only-2026}
  expire-ms: 86400000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: INFO
    com.ops.server: DEBUG
    com.ops.server.mapper: DEBUG
  file:
    name: ${EASYOPS_SERVER_DATA:./data}/logs/server.log
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30

# CORS：内网默认放行；生产可收紧为具体前端域名
cors:
  allowed-origins: "*"

# AI 分析（可选）
ai:
  apiKey: ${AI_API_KEY:}

websocket:
  max-connections: 1000

# Agent 路径配置（Server 计算 Agent 侧路径时使用）
ops:
  global:
    agent-data-path: ${AGENT_DATA_PATH:/app/data}
    deploy-base-dir: ${OPS_DEPLOY_BASE_DIR:/app/data/apps}
    log-sub-dir: logs
    config-sub-dir: config
    frontend-sub-dir: frontend
