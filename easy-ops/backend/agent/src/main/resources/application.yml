server:
  port: 2123
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# Agent configuration (Task 2: 移除默认 Token)
agent:
  server-url: ${AGENT_SERVER_URL:http://localhost:8081/api}
  token: ${AGENT_TOKEN:}
  node-name: ${AGENT_NODE_NAME:default-node}
  data-path: /app/data
  check-interval: 30
  host-ip: ${AGENT_HOST_IP:}
  host-port: ${AGENT_HOST_PORT:0}

# Logging
logging:
  level:
    com.ops.agent: INFO
  file:
    name: ./data/logs/agent.log
