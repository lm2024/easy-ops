# =============================================================================
# EasyOps Agent 配置
# =============================================================================
# 生产部署：直接用 scripts/start.sh 启动，无需修改本文件
# 所有生产配置通过环境变量或 start.sh 顶部的变量覆盖
# =============================================================================

server:
  port: ${AGENT_PORT:2123}
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# Agent 核心配置（start.sh 会自动 export 这些环境变量）
agent:
  # 【必须】Server API 地址，如 http://192.168.1.10:8081/api
  server-url: ${AGENT_SERVER_URL:http://localhost:8081/api}
  # 【必须】节点 Token（任意非空字符串，Server 按此自动注册节点）
  token: ${AGENT_TOKEN:}
  # 【必须】节点名称（在 Server 节点列表中显示）
  node-name: ${AGENT_NODE_NAME:default-node}
  # Agent 本地数据目录（版本包、日志、pid 等）
  data-path: ${AGENT_DATA_PATH:/app/data}
  version: ${AGENT_VERSION:1.0.0-SNAPSHOT}
  jar-path: ${AGENT_JAR_PATH:/app/agent.jar}
  # 重启模式：auto=自动检测；shell=裸机；docker=容器
  restart-mode: ${AGENT_RESTART_MODE:auto}
  restart-script: ${AGENT_RESTART_SCRIPT:}
  java-bin: ${AGENT_JAVA_BIN:}
  check-interval: 30
  # 【可选】上报给 Server 的外部 IP（多网卡时填写）
  host-ip: ${AGENT_HOST_IP:}
  # 【可选】上报给 Server 的外部端口（留空则用 server.port）
  host-port: ${AGENT_HOST_PORT:0}

logging:
  level:
    com.ops.agent: INFO
