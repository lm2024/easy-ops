# =============================================================================
# EasyOps Agent 配置
# -----------------------------------------------------------------------------
# 【私有化部署怎么改】
#   推荐方式：只改本机 scripts/easyops.env + 用 scripts/start.sh 启动。
#   启动脚本会注入 AGENT_DATA_PATH、AGENT_SERVER_URL 等，本文件默认值可不动。
#
#   若不用脚本、直接 java -jar 启动，需设置环境变量：
#     AGENT_TOKEN、AGENT_SERVER_URL、AGENT_DATA_PATH
#
#   端口：改 server.port 或在 easyops.env 里改 AGENT_PORT。
# =============================================================================

server:
  # Agent HTTP 监听端口（Server 通过此端口调用 Agent API）
  port: ${AGENT_PORT:2123}
  servlet:
    context-path: /api

spring:
  servlet:
    multipart:
      # Jar 包接收大小上限
      max-file-size: 500MB
      max-request-size: 500MB

# Agent 核心配置（优先读环境变量，启动脚本会自动 export）
agent:
  # Server API 根地址，如 http://192.168.1.10:8081/api
  server-url: ${AGENT_SERVER_URL:http://localhost:8081/api}
  # 节点 Token（留空则启动时自动生成并打印到日志）
  token: ${AGENT_TOKEN:}
  # 节点名称（在 Server 节点列表中显示）
  node-name: ${AGENT_NODE_NAME:default-node}
  # Agent 本地数据根目录：版本包、日志、pid、升级暂存等
  # 启动脚本通过 -Dagent.data-path 覆盖
  data-path: ${AGENT_DATA_PATH:/app/data}
  version: ${AGENT_VERSION:1.0.0-SNAPSHOT}
  jar-path: ${AGENT_JAR_PATH:/app/agent.jar}
  # 重启模式：auto=自动检测 Docker；shell=裸机生产；docker=强制容器模式
  restart-mode: ${AGENT_RESTART_MODE:auto}
  # 裸机自升级时调用的外置重启脚本（指向本机 scripts/start.sh）
  restart-script: ${AGENT_RESTART_SCRIPT:}
  # ARM 内网可显式指定 java 路径
  java-bin: ${AGENT_JAVA_BIN:}
  # 心跳间隔（秒）
  check-interval: 30
  # 上报给 Server 的外部 IP（多网卡时填写，留空则自动检测；本地调试/Docker 环境填 127.0.0.1）
  host-ip: ${AGENT_HOST_IP:127.0.0.1}
  # 上报给 Server 的外部端口（留空或 0 则用 server.port）
  host-port: ${AGENT_HOST_PORT:0}

logging:
  level:
    com.ops.agent: INFO
